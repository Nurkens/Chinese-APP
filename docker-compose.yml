version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: chinese_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chinese_app
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: chinese_redis
    ports:
      - "6379:6379"

volumes:
  pg_data: